<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c-bg: #010106;
  --c-purple: #2e1e58;
  --c-lilac: #6655a0;
  --c-pink: #8a3068;
  --c-card: rgba(8,5,22,.82);
  --c-text: #a89dc8;
  --c-muted: #3d3660;
}

html, body {
  width: 100%; height: 100%;
  background: var(--c-bg);
  color: var(--c-text);
  font-family: 'Syne', sans-serif;
  overflow: hidden;
  cursor: crosshair;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
  opacity: .45; pointer-events: none; z-index: 9999;
}

.blobs { position: fixed; inset: 0; overflow: hidden; z-index: 0; }
.blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: .55; animation: drift 14s ease-in-out infinite alternate; }
.blob-1 { width:520px;height:520px;background:#0d0628;top:-120px;left:-100px;animation-duration:16s; }
.blob-2 { width:380px;height:380px;background:#050820;bottom:-80px;right:-60px;animation-duration:12s;animation-delay:-4s; }
.blob-3 { width:280px;height:280px;background:#150818;top:40%;left:55%;animation-duration:18s;animation-delay:-8s; }
@keyframes drift { from{transform:translate(0,0) scale(1);} to{transform:translate(40px,30px) scale(1.08);} }

/* INTRO */
#intro {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 100; background: #000003;
  transition: opacity .9s ease, visibility .9s ease;
}
#intro.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.intro-bg { position:absolute;inset:0;background:radial-gradient(ellipse at 40% 50%,#060318 0%,#000003 70%); }
.intro-line {
  position:absolute;width:1px;height:80px;
  background:linear-gradient(to bottom,transparent,var(--c-purple),transparent);
  left:50%;top:30%;animation:scanline 2.5s ease-in-out infinite;opacity:.6;
}
@keyframes scanline { 0%,100%{transform:scaleY(1) translateY(0);opacity:.6;} 50%{transform:scaleY(1.4) translateY(20px);opacity:.2;} }
.intro-text {
  position:relative;
  font-family:'Space Mono',monospace;font-size:clamp(13px,1.4vw,16px);
  letter-spacing:.22em;color:#c0b0e8;opacity:0;
  animation:fadeUp 1.4s ease forwards .4s;cursor:pointer;user-select:none;
}
.intro-text span { display:inline-block;animation:blink 1.1s step-end infinite;margin-left:2px;color:var(--c-lilac); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }

/* MAIN */
#main {
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
  opacity:0;overflow-y:auto;
  transition:opacity 1s ease .2s;
  perspective: 1200px;
}
#main.visible { opacity:1; }

.card-wrapper {
  width:100%;max-width:420px;
  transform-style: preserve-3d;
  will-change: transform;
}

.card {
  backdrop-filter:blur(24px) saturate(1.6);
  background:var(--c-card);
  border:1px solid rgba(180,150,255,.15);
  border-radius:22px;padding:44px 40px 36px;
  width:100%;
  display:flex;flex-direction:column;align-items:center;gap:18px;
  box-shadow:0 0 80px rgba(80,40,160,.25),inset 0 1px 0 rgba(255,255,255,.08);
  opacity:0;animation:cardIn 1s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes cardIn { from{opacity:0;transform:translateY(30px) scale(.97);} to{opacity:1;transform:translateY(0) scale(1);} }

.avatar-wrap { position:relative;width:90px;height:90px; }
.avatar-wrap::before {
  content:'';position:absolute;inset:-4px;border-radius:50%;
  background:conic-gradient(from 0deg,#7b5ea7,#e87bb0,#5a9adf,#7b5ea7);
  animation:spin 5s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg);} }
.avatar {
  position:relative;width:100%;height:100%;border-radius:50%;
  background:linear-gradient(135deg,#2a1e4a 0%,#1e2a55 100%);
  overflow:hidden;border:3px solid #0a0b12;
  display:flex;align-items:center;justify-content:center;z-index:1;
}
.avatar svg { width:54px;height:54px; }

.username { font-size:28px;font-weight:800;letter-spacing:.04em;color:#fff;text-shadow:0 0 30px rgba(120,80,200,.5);font-style:italic; }
.username .flip7 { display:inline-block; transform:scaleX(-1); }

.badges { display:flex;gap:6px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:99px;padding:5px 12px;font-size:18px; }

.bio { font-family:'Space Mono',monospace;font-size:12.5px;color:var(--c-muted);text-align:center;letter-spacing:.03em;line-height:1.6; }

.divider { width:100%;height:1px;background:linear-gradient(to right,transparent,rgba(180,150,255,.25),transparent); }

.links { display:flex;flex-wrap:wrap;gap:10px;justify-content:center; }
.link-btn {
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,.3);border:1px solid rgba(180,150,255,.18);
  border-radius:10px;padding:9px 16px;color:var(--c-text);text-decoration:none;
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;
  cursor:pointer;white-space:nowrap;
  transition:background .2s,border-color .2s,transform .15s;
}
.link-btn:hover { background:rgba(120,80,200,.3);border-color:rgba(180,150,255,.45);transform:translateY(-2px); }
.link-btn svg { width:16px;height:16px;flex-shrink:0; }

.views { display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:11px;color:var(--c-muted);align-self:flex-start;margin-top:4px; }
.views svg { width:14px;height:14px; }

/* MUSIC PLAYER */
.music-bar {
  width:100%;display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,.28);border:1px solid rgba(180,150,255,.14);
  border-radius:12px;padding:10px 14px;
}
.music-toggle {
  width:34px;height:34px;border-radius:50%;
  border:1px solid rgba(180,150,255,.3);background:rgba(120,80,200,.25);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  transition:background .2s,transform .15s;color:var(--c-text);
}
.music-toggle:hover { background:rgba(120,80,200,.5);transform:scale(1.08); }
.music-toggle svg { width:16px;height:16px; }
.music-info { flex:1;overflow:hidden; }
.music-title { font-family:'Space Mono',monospace;font-size:10.5px;color:var(--c-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.04em; }
.music-artist { font-family:'Space Mono',monospace;font-size:9.5px;color:var(--c-muted);letter-spacing:.03em;margin-top:2px; }
.eq { display:flex;align-items:flex-end;gap:2px;height:18px;flex-shrink:0; }
.eq-bar { width:3px;border-radius:2px;background:var(--c-lilac);animation:eq-bounce var(--d,.7s) ease-in-out infinite alternate;transform-origin:bottom; }
.eq-bar:nth-child(1){--d:.6s;height:8px;}
.eq-bar:nth-child(2){--d:.9s;height:14px;animation-delay:.1s;}
.eq-bar:nth-child(3){--d:.5s;height:10px;animation-delay:.2s;}
.eq-bar:nth-child(4){--d:.8s;height:16px;animation-delay:.05s;}
.eq-bar:nth-child(5){--d:.65s;height:6px;animation-delay:.15s;}
@keyframes eq-bounce { from{transform:scaleY(.3);opacity:.5;} to{transform:scaleY(1);opacity:1;} }
.eq.paused .eq-bar { animation-play-state:paused;transform:scaleY(.3);opacity:.4; }
.vol-wrap { display:flex;align-items:center;gap:6px;flex-shrink:0; }
.vol-wrap svg { width:13px;height:13px;color:var(--c-muted); }
input[type=range].vol {
  -webkit-appearance:none;width:56px;height:3px;

}
input[type=range].vol::-webkit-slider-thumb {
  -webkit-appearance:none;width:11px;height:11px;
  border-radius:50%;background:var(--c-lilac);cursor:pointer;transition:transform .15s;
}
input[type=range].vol::-webkit-slider-thumb:hover { transform:scale(1.3); }
</style>
</head>

var intro       = document.getElementById('intro');
var main        = document.getElementById('main');
var musicBtn    = document.getElementById('musicBtn');
var iconPlay    = document.getElementById('iconPlay');
var iconPause   = document.getElementById('iconPause');
var eq          = document.getElementById('eq');
var volSlider   = document.getElementById('volSlider');

document.getElementById('musicArtist').textContent = TRACK_ARTIST;

var audio   = new Audio(TRACK_URL);
audio.loop  = true;
audio.volume = 0.6;
var playing = false;

function setPlaying(state) {
  playing = state;
  if (playing) {
    audio.play().catch(function(){});
    iconPlay.style.display  = 'none';
    iconPause.style.display = '';
    eq.classList.remove('paused');
  } else {
    audio.pause();
    iconPlay.style.display  = '';
    iconPause.style.display = 'none';
    eq.classList.add('paused');
  }
}

musicBtn.addEventListener('click', function() { setPlaying(!playing); });
volSlider.addEventListener('input', function() { audio.volume = parseFloat(volSlider.value); });

function enter() {
  intro.classList.add('hidden');
  main.classList.add('visible');
  audio.volume = 0;
  audio.play().then(function() {
    playing = true;
    iconPlay.style.display  = 'none';
    iconPause.style.display = '';
    eq.classList.remove('paused');
    var target = parseFloat(volSlider.value);
    var v = 0;
    var t = setInterval(function() {
      v = Math.min(v + 0.03, target);
      audio.volume = v;
      if (v >= target) clearInterval(t);
    }, 60);
  }).catch(function(){});
  setTimeout(countUp, 600);
}

intro.addEventListener('click', enter);
document.addEventListener('keydown', function(e) {
  if ((e.key === 'Enter' || e.key === ' ') && !intro.classList.contains('hidden')) enter();
});

// View counter
var TARGET = 3477, current = 0;
var el = document.getElementById('viewCount');
function countUp() {
  var step = Math.ceil(TARGET / 80);
  (function tick() {
    if (current < TARGET) {
      current = Math.min(current + step, TARGET);
      el.textContent = current.toLocaleString();
      requestAnimationFrame(tick);
    }
  })();
}

// ── Smooth parallax with lerp ──
var targetRX = 0, targetRY = 0;
var currentRX = 0, currentRY = 0;
var ticking = false;

function lerp(a, b, t) { return a + (b - a) * t; }

function animateCard() {
  currentRX = lerp(currentRX, targetRX, 0.07);
  currentRY = lerp(currentRY, targetRY, 0.07);

  var dx = Math.abs(currentRX - targetRX);
  var dy = Math.abs(currentRY - targetRY);

  cardWrapper.style.transform =
    'rotateX(' + currentRX.toFixed(3) + 'deg) rotateY(' + currentRY.toFixed(3) + 'deg)';

  if (dx > 0.01 || dy > 0.01) {
    requestAnimationFrame(animateCard);
  } else {
    ticking = false;
  }
}

document.addEventListener('mousemove', function(e) {
  if (!intro.classList.contains('hidden')) return;
  var cx = window.innerWidth  / 2;
  var cy = window.innerHeight / 2;
  var dx = (e.clientX - cx) / cx;
  var dy = (e.clientY - cy) / cy;
  targetRY =  dx * 14;
  targetRX = -dy * 9;
  if (!ticking) {
    ticking = true;
    requestAnimationFrame(animateCard);
  }
});

document.addEventListener('mouseleave', function() {
  targetRX = 0;
  targetRY = 0;
  if (!ticking) {
    ticking = true;
    requestAnimationFrame(animateCard);
  }
});
</script>
</body>
</html>
